schema_version: "1.0"
description: "Skill 01（超级提示词工程师）→ Skill 02（SOP工程化）的优化提示词交接格式"
backward_compatibility: "quality_scores为v1.1新增；旧版本Skill 02忽略此字段向后兼容"

required_fields:
  optimized_prompts:
    type: "array"
    description: "每个能力的三档优化提示词"
    item_fields:
      capability_id: "string（对应子能力标识）"
      capability_name: "string"
      system_prompt_full: "string（完整版，~2000-4000 tokens）"
      system_prompt_lite: "string（精简版，~500-1500 tokens）"
      activation_card: "string（激活卡片，≤200字）"
      quality_scores:
        hallucination_free: "boolean"
        structure_complete: "boolean"
        actionable: "boolean"
        model_agnostic: "boolean"

  temperature_recommendation:
    type: "object"
    fields:
      default: "float（0.0-1.0）"
      by_task_type:
        execution: "float（分类/执行类任务，建议0）"
        creative: "float（创作类任务，建议0.7）"
        analysis: "float（分析类任务，建议0.3）"

  environment_assumptions:
    type: "array"
    items: "string"
    description: "提示词依赖的环境假设（如：假设目标模型支持系统提示词）"

optional_fields:
  model_specific_warnings:
    type: "array"
    description: "特定模型可能的兼容性注意事项"
    item_fields:
      model: "string"
      warning: "string"

  optimization_notes:
    type: "string"
    description: "优化过程中的关键决策说明"

  original_issues_found:
    type: "array"
    description: "原始提示词发现的问题清单（P0/P1/P2）"

format_example:
  handoff:
    schema_version: "1.0"
    from_skill: "skill-01"
    to_skill: "skill-02"
    payload:
      optimized_prompts:
        - capability_id: "CAP-001"
          capability_name: "客户反馈情感分析"
          system_prompt_full: |
            ## 角色定义
            你是客户反馈情感分析专家，专注于中文客户反馈文本的情感极性判断。

            ## 核心任务
            对输入的客户反馈文本进行三分类情感分析：正面 / 中立 / 负面

            ## 执行步骤
            1. 读取输入文本
            2. 识别情感指示词（赞美/投诉/中性描述）
            3. 综合判断情感极性
            4. 输出：极性标签 + 置信度（0-1） + 关键触发词

            ## 输出格式
            极性：[正面/中立/负面]
            置信度：[0.0-1.0]
            触发词：[列表]
            摘要：[1句话]

            ## 约束
            - 温度=0，保证输出确定性
            - 不虚构未出现在文本中的情感信号
            - 对模糊文本输出「中立」，不强行判断
          system_prompt_lite: |
            你是情感分析专家。对中文客户反馈进行三分类（正面/中立/负面）。
            输出：极性+置信度+触发词+1句摘要。温度=0，不虚构。
          activation_card: "分析以下客户反馈的情感倾向（正面/中立/负面），给出置信度和关键触发词："
          quality_scores:
            hallucination_free: true
            structure_complete: true
            actionable: true
            model_agnostic: true

      temperature_recommendation:
        default: 0
        by_task_type:
          execution: 0
          creative: 0.7
          analysis: 0.3

      environment_assumptions:
        - "目标模型支持系统提示词（System Prompt）"
        - "模型上下文窗口≥4K tokens"
        - "运行环境可访问中文文本"

      optimization_notes: "原始提示词缺少输出格式规范和温度建议；已补充结构化输出格式和零温度约束"

      original_issues_found:
        - level: "P1"
          issue: "缺少输出格式规范，AI可能返回非结构化文本"
        - level: "P1"
          issue: "未声明温度建议，执行型任务应设temperature=0"

    user_action: "将以上 payload 复制，粘贴到 Skill 02（SOP工程师）的对话开头"
    created_at: "2025-06-01"
